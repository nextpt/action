name: 构建织梦正式服

on:
  push:
    branches:
      - main  # 仅在 test 分支推送或合并时触发

jobs:
  build:
    runs-on: ubuntu-latest  # 改为最新的 Ubuntu 版本

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          repository: tsinbal/zm-java-server
          ref: zm-prod
          token: ${{ secrets.MY_ACCESS_TOKEN }}

      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{secrets.DOCKER_USERNAME}}
          password: ${{secrets.DOCKER_PASSWORD}}

      - name: Build Docker image
        run: |
          docker build --progress=plain  -t tsinbal/zm-java-server:zm-prod .

      - name: Push Docker image
        run: |
          docker push  ${{secrets.DOCKER_USERNAME}}/zm-java-server:zm-prod