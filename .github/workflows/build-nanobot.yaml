name: 构建nanobot镜像
on:
  repository_dispatch:
    types: [nanobot_event]  # 事件类型，可自定义

jobs:
  build:
    runs-on: ubuntu-latest  # 改为最新的 Ubuntu 版本

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          repository: tsinbal/nanobot
          ref: main
          token: ${{ secrets.MY_ACCESS_TOKEN }}

      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{secrets.DOCKER_USERNAME}}
          password: ${{secrets.DOCKER_PASSWORD}}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2
        
      - name: Generate timestamp
        id: vars
        run: echo "tag=$(date +'%Y%m%d-%H%M')" >> $GITHUB_OUTPUT

      - name: Build and push Docker image
        run: |
          docker buildx build \
            --platform linux/amd64,linux/arm64 \
            --progress=plain \
            -t ${{ secrets.DOCKER_USERNAME }}/nanobot:${{ steps.vars.outputs.tag }} \
            -t ${{ secrets.DOCKER_USERNAME }}/nanobot:latest \
            --push .
